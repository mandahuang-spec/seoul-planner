<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seoul Spring Trip</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf2f2; }
        .glass-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #f472b6; border-bottom: 3px solid #f472b6; }
        .card-shadow { box-shadow: 0 4px 20px rgba(244, 114, 182, 0.1); }
        /* 頁首圓弧效果 */
        .banner-curve { border-radius: 0 0 40px 40px; }
        .content-up { margin-top: -30px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">
        
        <div class="relative h-[250px] w-full overflow-hidden banner-curve bg-white">
            <img src="https://i.imgur.com/your-uploaded-image.png" class="w-full h-full object-cover" alt="Banner">
            
            <div class="absolute bottom-10 right-4 flex space-x-2 glass-nav p-2 rounded-2xl shadow-lg">
                <button @click="currentTab = 'itinerary'" :class="{'text-pink-500': currentTab === 'itinerary'}" class="p-2"><i data-lucide="map-pin"></i></button>
                <button @click="currentTab = 'info'" :class="{'text-pink-500': currentTab === 'info'}" class="p-2"><i data-lucide="info"></i></button>
                <button @click="currentTab = 'shopping'" :class="{'text-pink-500': currentTab === 'shopping'}" class="p-2"><i data-lucide="shopping-basket"></i></button>
                <button @click="currentTab = 'expense'" :class="{'text-pink-500': currentTab === 'expense'}" class="p-2"><i data-lucide="circle-dollar-sign"></i></button>
            </div>
        </div>

        <div class="content-up px-4 relative z-10">
            
            <div v-if="currentTab === 'itinerary'">
                <div class="bg-white/80 backdrop-blur rounded-3xl p-4 mb-4 flex items-center justify-between card-shadow">
                    <div class="flex items-center space-x-3">
                        <span class="text-4xl text-yellow-400">☀️</span>
                        <div>
                            <p class="text-gray-500 text-xs">Seoul Today</p>
                            <p class="font-bold text-lg text-gray-700">12°C / <span class="text-sm font-normal text-gray-400 text-xs">Feels 10°C</span></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-pink-400 font-medium">櫻花盛開中</p>
                    </div>
                </div>

                <div class="flex space-x-4 overflow-x-auto hide-scrollbar py-2 mb-4">
                    <div v-for="d in dates" :key="d.date" 
                         @click="selectedDate = d.date"
                         :class="selectedDate === d.date ? 'bg-pink-400 text-white shadow-md' : 'bg-white text-gray-400'"
                         class="flex-shrink-0 w-14 h-18 py-3 rounded-2xl flex flex-col items-center transition-all">
                        <span class="text-[10px] font-bold uppercase">{{ d.day }}</span>
                        <span class="text-xl font-bold">{{ d.num }}</span>
                    </div>
                </div>

                <div id="itinerary-list" class="space-y-6">
                    <div class="bg-gradient-to-br from-pink-400 to-rose-400 p-5 rounded-3xl text-white shadow-lg">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold bg-white/30 px-2 py-1 rounded-lg">Flight BR146</span>
                            <i data-lucide="plane" class="w-4 h-4"></i>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-center">
                                <p class="text-2xl font-bold">KHH</p>
                                <p class="text-xs opacity-80">06:55</p>
                            </div>
                            <div class="flex-1 border-t border-dashed border-white/50 mx-4 relative">
                                <i data-lucide="chevron-right" class="absolute -right-2 -top-2 w-4 h-4"></i>
                            </div>
                            <div class="text-center">
                                <p class="text-2xl font-bold">ICN</p>
                                <p class="text-xs opacity-80">10:45</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-center space-x-2 text-gray-400 text-xs">
                        <div class="h-8 border-l border-dashed border-pink-200"></div>
                        <i data-lucide="bus" class="w-4 h-4"></i>
                        <span>65 mins</span>
                    </div>

                    <div class="bg-white p-4 rounded-3xl card-shadow flex flex-col relative" @click="openGoogleMap('Dongdaemun Hotel 27')">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-pink-400 bg-pink-50 px-2 py-1 rounded-lg">住宿</span>
                            <span class="text-xs text-gray-400">09:00 - 20:00</span>
                        </div>
                        <h3 class="font-bold text-gray-700 text-lg">Dongdaemun Hotel 27</h3>
                        <p class="text-xs text-gray-400 mt-1">備註：先去放行李</p>
                    </div>
                </div>
            </div>

            <div v-if="currentTab === 'info'" class="space-y-4">
                <div class="bg-white p-5 rounded-3xl card-shadow">
                    <h2 class="font-bold mb-4 flex items-center text-pink-500"><i data-lucide="refresh-ccw" class="mr-2 w-5 h-5"></i>匯率換算</h2>
                    <div class="space-y-3">
                        <div class="flex items-center space-x-2">
                            <input type="number" v-model="krwInput" placeholder="韓幣 KRW" class="w-full p-3 bg-pink-50 rounded-xl outline-none">
                            <span>₩</span>
                        </div>
                        <div class="text-center text-pink-400"><i data-lucide="arrow-down-up" class="mx-auto w-4 h-4"></i></div>
                        <div class="p-3 bg-gray-50 rounded-xl text-gray-500">約 NT$ {{ (krwInput * 0.024).toFixed(2) }}</div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl card-shadow">
                    <h2 class="font-bold mb-3 flex items-center text-pink-500"><i data-lucide="hotel" class="mr-2 w-5 h-5"></i>住宿資訊</h2>
                    <p class="text-sm font-bold text-gray-700">Dongdaemun HOTEL 27</p>
                    <p class="text-xs text-gray-400 mt-1">서울특별시 성동구 자동차시장1길 27</p>
                    <a href="tel:+821096423111" class="mt-3 inline-block text-sm text-pink-400 underline">撥打電話: +82 1096423111</a>
                </div>
            </div>

            </div>

        <button class="fixed bottom-8 right-6 w-14 h-14 bg-pink-400 text-white rounded-full shadow-2xl flex items-center justify-center transition-transform active:scale-90 z-50">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>

        <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-pink-100 flex justify-around py-3 z-40 lg:hidden">
             </nav>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const currentTab = ref('itinerary');
                const selectedDate = ref('2026-04-04');
                const krwInput = ref(0);

                const dates = [
                    { day: 'Thu', num: '4', date: '2026-04-04' },
                    { day: 'Fri', num: '5', date: '2026-04-05' },
                    { day: 'Sat', num: '6', date: '2026-04-06' },
                    { day: 'Sun', num: '7', date: '2026-04-07' },
                    { day: 'Mon', num: '8', date: '2026-04-08' },
                    { day: 'Tue', num: '9', date: '2026-04-09' },
                    { day: 'Wed', num: '10', date: '2026-04-10' },
                ];

                const openGoogleMap = (query) => {
                    const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
                    window.open(url, '_blank');
                };

                onMounted(() => {
                    lucide.createIcons();
                    // 啟用拖拽功能
                    const el = document.getElementById('itinerary-list');
                    if(el) Sortable.create(el, { animation: 150 });
                });

                return { currentTab, selectedDate, dates, krwInput, openGoogleMap };
            }
        }).mount('#app');
    </script>
</body>
</html>
